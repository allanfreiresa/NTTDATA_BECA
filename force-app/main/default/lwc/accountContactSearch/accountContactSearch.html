<template>
    <lightning-card title="Account Lookup and Contacts">
        <div class="slds-p-around_medium">
            <lightning-input
                label="Search Account"
                value={accountSearchTerm}
                onchange={handleAccountSearchChange}>
            </lightning-input>
            <template if:true={accountOptions}>
                <ul>
                    <template for:each={accountOptions} for:item="account">
                        <li key={account.Id}>
                            <button data-id={account.Id} onclick={handleAccountSelect}>{account.Name}</button>
                        </li>
                    </template>
                </ul>
            </template>
            <template if:true={selectedAccountName}>
                <p>Selected Account: {selectedAccountName}</p>
                <template if:true={contacts}>
                    <h3>Contacts</h3>
                    <ul>
                        <template for:each={contacts} for:item="contact">
                            <li key={contact.Id}>
                                {contact.Name} - {contact.Email}
                            </li>
                        </template>
                    </ul>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
